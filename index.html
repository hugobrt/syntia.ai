<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden | Syntia AI</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #d4af37;
            --text: #ffffff;
            --border: rgba(212, 175, 55, 0.2);
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .bg-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 70%);
            z-index: -2;
        }

        .aura {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            border-radius: 50%; animation: breathe 8s infinite ease-in-out;
            z-index: -1;
        }

        .lang-toggle {
            position: absolute; top: 30px; right: 40px;
            background: transparent; border: 1px solid var(--border);
            color: #666; padding: 8px 20px; font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.4s; border-radius: 2px;
        }

        .lang-toggle:hover { color: var(--accent); border-color: var(--accent); }

        .main-frame {
            text-align: center; border: 1px solid var(--border);
            padding: 80px 100px; position: relative;
            backdrop-filter: blur(10px); background: rgba(0,0,0,0.4);
        }

        .main-frame::before {
            content: ''; position: absolute; top: -1px; left: 10%; width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        h1 {
            font-size: 9rem; font-weight: 100; margin: 0;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em; line-height: 1;
        }

        .forbidden-label {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1em;
            color: var(--accent); margin-top: -10px; margin-bottom: 50px;
            font-weight: 300; opacity: 0.8;
        }

        .description {
            color: #555; font-size: 0.85rem; letter-spacing: 0.1em;
            max-width: 300px; margin: 0 auto 50px auto; line-height: 1.6;
        }

        .btn-verify {
            background: transparent; border: 1px solid var(--accent);
            color: var(--text); padding: 18px 50px; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.4em;
            cursor: pointer; transition: 0.5s; position: relative;
            overflow: hidden;
        }

        .btn-verify::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .btn-verify:hover::after { left: 100%; }
        .btn-verify:hover { background: var(--accent); color: #000; box-shadow: 0 0 40px rgba(212, 175, 55, 0.2); }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }

        @media (max-width: 600px) {
            .main-frame { padding: 50px 30px; border: none; }
            h1 { font-size: 6rem; }
            .lang-toggle { right: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="aura"></div>

    <button class="lang-toggle" id="langBtn" onclick="toggleLang()">FR</button>

    <div class="main-frame">
        <h1>403</h1>
        <div class="forbidden-label" id="err">Forbidden</div>
        <p class="description" id="desc">Unauthorized encrypted node. Identification required for decryption.</p>
        <button class="btn-verify" id="btn" onclick="u()">Verify Identity</button>
    </div>

    <script>
        let L = 'en';
        const texts = {
            en: {
                err: "Forbidden",
                desc: "Unauthorized encrypted node. Identification required for decryption.",
                btn: "Verify Identity",
                prompt: "Identify yourself:",
                denied: "Identity rejected.",
                switch: "FR"
            },
            fr: {
                err: "Interdit",
                desc: "Nœud crypté non autorisé. Identification requise pour le déchiffrement.",
                btn: "Vérifier l'identité",
                prompt: "Identifiez-vous :",
                denied: "Identité rejetée.",
                switch: "EN"
            }
        };

        function toggleLang() {
            L = L === 'en' ? 'fr' : 'en';
            document.getElementById('err').innerText = texts[L].err;
            document.getElementById('desc').innerText = texts[L].desc;
            document.getElementById('btn').innerText = texts[L].btn;
            document.getElementById('langBtn').innerText = texts[L].switch;
        }

        function u() {
            const i = prompt(texts[L].prompt);
            if (btoa(i) === "SEIyMDI2") {
                window.location.replace("main.html");
            } else if (i) {
                alert(texts[L].denied);
            }
        }
    </script>
</body>
</html>
