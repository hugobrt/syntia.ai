<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntia AI</title>
    <style>
        :root {
            --bg: #000000;
            --gold: #c5a059;
            --gray: #1a1a1a;
            --text-dim: #555;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
        }

        .brand {
            font-size: 0.7rem;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 60px;
            font-weight: 300;
        }

        .gate-title {
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: -0.01em;
            margin-bottom: 50px;
            color: #eee;
        }

        .divider {
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, var(--bg), var(--gold), var(--bg));
            margin: 0 auto 50px auto;
        }

        .btn-access {
            background: transparent;
            color: #fff;
            border: 1px solid var(--gray);
            padding: 16px 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 2px;
        }

        .btn-access:hover {
            border-color: var(--gold);
            letter-spacing: 0.4em;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.1);
        }

        .footer-note {
            position: fixed;
            bottom: 40px;
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">Syntia AI</div>
        
        <h1 class="gate-title">Accès Privé. Identifiez-vous.</h1>
        
        <div class="divider"></div>

        <button class="btn-access" onclick="u()">Authentification</button>
    </div>

    <div class="footer-note">Protocol 2026 — Secure Node</div>

    <script>
        function u() {
            const i = prompt("Entrez la clé :");
            if (btoa(i) === "SEIyMDI2") {
                window.location.replace("main.html");
            } else if (i) {
                alert("Clé refusée.");
            }
        }
    </script>
</body>
</html>
