<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | Syntia AI</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #d4af37;
            --text: #ffffff;
            --glass: rgba(15, 15, 15, 0.7);
            --border: rgba(212, 175, 55, 0.15);
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background: radial-gradient(circle at 50% 0%, #1a1814 0%, #000 70%);
        }

        .ambient-light {
            position: absolute; width: 80vw; height: 80vh;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.04) 0%, transparent 60%);
            border-radius: 50%; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-light 10s infinite alternate ease-in-out;
            z-index: -1;
        }

        .lang-btn {
            position: absolute; top: 40px; right: 50px;
            background: transparent; border: 1px solid var(--border);
            color: #888; padding: 8px 16px; font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.4s ease; border-radius: 4px;
        }

        .lang-btn:hover {
            color: var(--accent); border-color: var(--accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .glass-panel {
            text-align: center; padding: 70px 100px;
            background: var(--glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 8px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: float 6s infinite ease-in-out;
            position: relative; overflow: hidden;
        }

        .glass-panel::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scanline 4s infinite linear;
        }

        h1 {
            font-size: 10rem; font-weight: 200; margin: 0;
            background: linear-gradient(180deg, #fff 20%, #333 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em; line-height: 0.9;
        }

        .label {
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.8em;
            color: var(--accent); margin-top: 10px; margin-bottom: 60px;
            font-weight: 300; opacity: 0.9;
        }

        .btn-access {
            background: transparent; border: 1px solid var(--accent);
            color: var(--text); padding: 16px 45px; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.3em;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; border-radius: 4px; overflow: hidden;
        }

        .btn-access::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent); z-index: -1;
            transform: scaleX(0); transform-origin: right; transition: transform 0.4s ease;
        }

        .btn-access:hover::before { transform: scaleX(1); transform-origin: left; }
        .btn-access:hover { color: #000; font-weight: 600; border-color: transparent; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }

        @keyframes pulse-light {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes scanline {
            0% { left: -100%; }
            50%, 100% { left: 200%; }
        }

        @media (max-width: 600px) {
            .glass-panel { padding: 50px 30px; border: none; background: transparent; box-shadow: none; animation: none; }
            .glass-panel::before { display: none; }
            h1 { font-size: 7rem; }
            .lang-btn { right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <button class="lang-btn" id="lBtn" onclick="t()">FR</button>

    <div class="glass-panel">
        <h1>403</h1>
        <div class="label" id="txt">Forbidden Access</div>
        <button class="btn-access" id="bBtn" onclick="u()">Verify Identity</button>
    </div>

    <script>
        let L = 'en';
        const d = {
            en: { txt: "Forbidden Access", btn: "Verify Identity", p: "Identify yourself:", err: "Identity rejected.", sw: "FR" },
            fr: { txt: "Accès Interdit", btn: "Authentification", p: "Identifiez-vous :", err: "Identité rejetée.", sw: "EN" }
        };

        function t() {
            L = L === 'en' ? 'fr' : 'en';
            document.getElementById('txt').innerText = d[L].txt;
            document.getElementById('bBtn').innerText = d[L].btn;
            document.getElementById('lBtn').innerText = d[L].sw;
        }

        function u() {
            const i = prompt(d[L].p);
            if (btoa(i) === "SEIyMDI2") {
                window.location.replace("main.html");
            } else if (i) {
                alert(d[L].err);
            }
        }
    </script>
</body>
</html>
