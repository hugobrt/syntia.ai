<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | Syntia AI</title>
    <style>
        :root {
            --bg: #000000;
            --gold: #dfba6b;
            --gold-dim: rgba(223, 186, 107, 0.15);
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Helvetica Neue', 'Inter', -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .core-glow {
            position: absolute; width: 40vw; height: 40vw;
            background: radial-gradient(circle, var(--gold-dim) 0%, transparent 60%);
            border-radius: 50%; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: breathe 6s infinite alternate ease-in-out;
            z-index: 0; filter: blur(40px);
        }

        .orbit-ring {
            position: absolute; width: 500px; height: 500px;
            border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 0;
        }

        .orbit-ring::before {
            content: ''; position: absolute; top: -1px; left: 50%;
            width: 80px; height: 2px; background: var(--gold);
            box-shadow: 0 0 20px var(--gold);
            animation: spin 8s linear infinite;
            transform-origin: 0 250px;
        }

        .lang-btn {
            position: absolute; top: 30px; right: 40px; z-index: 10;
            background: none; border: none; color: #444;
            font-size: 0.65rem; letter-spacing: 0.2em; cursor: pointer;
            transition: 0.4s; padding: 10px; text-transform: uppercase;
        }

        .lang-btn:hover { color: var(--gold); }

        .container {
            position: relative; z-index: 1; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 {
            font-size: clamp(8rem, 18vw, 15rem); font-weight: 100; margin: 0;
            color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15);
            letter-spacing: -0.02em; line-height: 1;
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.02);
        }

        .label {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.2em;
            color: var(--gold); margin-top: -10px; margin-bottom: 50px;
            font-weight: 300; margin-right: -1.2em;
        }

        .btn-verify {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff; padding: 16px 45px; font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 0.4em;
            cursor: pointer; transition: 0.4s ease; border-radius: 100px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .btn-verify:hover {
            border-color: var(--gold); background: rgba(223, 186, 107, 0.05);
            box-shadow: 0 10px 30px rgba(223, 186, 107, 0.15);
            transform: translateY(-2px); color: var(--gold);
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        @keyframes spin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        @media (max-width: 600px) {
            .orbit-ring { width: 300px; height: 300px; }
            .orbit-ring::before { transform-origin: 0 150px; width: 50px; }
        }
    </style>
</head>
<body>

    <div class="core-glow"></div>
    <div class="orbit-ring"></div>

    <button class="lang-btn" id="lBtn" onclick="t()">FR</button>

    <div class="container">
        <h1>403</h1>
        <div class="label" id="txt">Forbidden Access</div>
        <button class="btn-verify" id="bBtn" onclick="u()">Verify Identity</button>
    </div>

    <script>
        let L = 'en';
        const d = {
            en: { txt: "Forbidden Access", btn: "Verify Identity", p: "Identify yourself:", err: "Identity rejected.", sw: "FR" },
            fr: { txt: "Accès Interdit", btn: "Authentification", p: "Identifiez-vous :", err: "Identité rejetée.", sw: "EN" }
        };

        function t() {
            L = L === 'en' ? 'fr' : 'en';
            document.getElementById('txt').innerText = d[L].txt;
            document.getElementById('bBtn').innerText = d[L].btn;
            document.getElementById('lBtn').innerText = d[L].sw;
        }

        function u() {
            const i = prompt(d[L].p);
            if (btoa(i) === "SEIyMDI2") {
                window.location.replace("main.html");
            } else if (i) {
                alert(d[L].err);
            }
        }
    </script>
</body>
</html>
