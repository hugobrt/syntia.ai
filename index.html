<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Syntia Protocol</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #ffffff;
            --muted: #222222;
            --glitch-1: #00ffff;
            --glitch-2: #ff00ff;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--accent);
            font-family: 'SF Mono', 'Roboto Mono', monospace;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .system-frame {
            border: 1px solid var(--muted);
            padding: 60px 80px;
            position: relative;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            max-width: 80%;
            text-align: center;
        }

        .system-frame::before, .system-frame::after {
            content: '';
            position: absolute; width: 20px; height: 20px;
            border: 2px solid var(--accent);
        }
        
        .system-frame::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .system-frame::after { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .frame-header {
            position: absolute; top: -10px; left: 20px;
            background: var(--bg); padding: 0 10px;
            color: var(--muted); font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.2em;
        }

        .glitch-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(5rem, 18vw, 10rem);
            font-weight: 900; margin: 0;
            letter-spacing: -0.05em;
            position: relative;
            animation: glitch 3s infinite;
        }

        h1::before, h1::after {
            content: "404"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        h1::before {
            left: 3px; text-shadow: -2px 0 var(--glitch-1);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 4s infinite linear alternate-reverse;
        }

        h1::after {
            left: -3px; text-shadow: -2px 0 var(--glitch-2);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .status {
            color: var(--muted); text-transform: uppercase;
            letter-spacing: 0.4em; font-size: 0.8rem;
            margin-bottom: 60px;
            animation: pulse 2s infinite;
        }

        .btn-auth {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 15px 30px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            font-family: inherit;
        }

        .btn-auth:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(-3px, 2px); }
            92% { transform: translate(3px, -1px); }
            93% { transform: translate(-2px, -3px); }
            94% { transform: translate(2px, 3px); }
            95% { transform: translate(-3px, 0); }
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 40px, 0); }
            20% { clip: rect(80px, 9999px, 120px, 0); }
            40% { clip: rect(20px, 9999px, 60px, 0); }
            60% { clip: rect(60px, 9999px, 80px, 0); }
            80% { clip: rect(100px, 9999px, 140px, 0); }
            100% { clip: rect(10px, 9999px, 40px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(50px, 9999px, 70px, 0); }
            20% { clip: rect(30px, 9999px, 90px, 0); }
            40% { clip: rect(110px, 9999px, 130px, 0); }
            60% { clip: rect(70px, 9999px, 50px, 0); }
            80% { clip: rect(10px, 9999px, 110px, 0); }
            100% { clip: rect(50px, 9999px, 70px, 0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 600px) {
            .system-frame { padding: 40px 30px; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="system-frame">
        <div class="frame-header">Syntia Security Protocol</div>
        <div class="glitch-wrapper">
            <h1 data-text="404">404</h1>
        </div>
        <div class="status">System Unauthorized Access</div>
        <button class="btn-auth" onclick="u()">Initialize Identity</button>
    </div>

    <script>
        function u() {
            const i = prompt("Credentials Required:");
            if (btoa(i) === "SEIyMDI2") {
                window.location.replace("main.html");
            } else if (i) {
                alert("Identity Mismatch.");
            }
        }
    </script>
</body>
</html>
