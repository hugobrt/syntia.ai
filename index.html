<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Syntia AI</title>
    <style>
        :root { --bg: #050505; --accent: #fff; }
        body {
            margin: 0; background: var(--bg); color: var(--accent);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; flex-direction: column;
        }
        h1 {
            font-size: clamp(6rem, 20vw, 12rem); font-weight: 900; margin: 0;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #fff 0%, #111 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .status {
            color: #444; text-transform: uppercase; letter-spacing: 0.5em;
            font-size: 0.8rem; margin-top: -20px; margin-bottom: 50px;
        }
        .btn {
            background: transparent; color: var(--accent); border: 1px solid #222;
            padding: 12px 24px; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.2em; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #fff; color: #000; border-color: #fff; }
    </style>
</head>
<body>
    <h1>404</h1>
    <div class="status">System Offline</div>
    <button class="btn" onclick="u()">Initialize Auth</button>

    <script>
        function u() {
            const i = prompt("Credentials:");
            if (btoa(i) === "SEIyMDI2") {
                window.location.replace("main.html");
            } else if (i) {
                alert("Access Denied.");
            }
        }
    </script>
</body>
</html>
