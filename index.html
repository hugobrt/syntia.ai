<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntia AI</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --light-gray: #f5f5f7;
            --border: #e5e5e5;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            text-align: center;
            max-width: 400px;
            padding: 40px;
        }

        .logo-area {
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 80px;
            color: #888;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 40px;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .line {
            width: 40px;
            height: 1px;
            background: var(--border);
            margin: 0 auto 40px auto;
        }

        .btn-enter {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 14px 32px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-enter:hover {
            transform: scale(1.02);
            background: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .info {
            margin-top: 100px;
            font-size: 0.75rem;
            color: #b5b5b5;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-area">Syntia</div>
        
        <h1>Accès restreint aux membres du protocole.</h1>
        
        <div class="line"></div>

        <button class="btn-enter" onclick="u()">Authentification</button>

        <div class="info">© 2026 PRIVACY FIRST</div>
    </div>

    <script>
        function u() {
            const i = prompt("Clé d'accès :");
            if (btoa(i) === "SEIyMDI2") {
                window.location.replace("main.html");
            } else if (i) {
                alert("Clé invalide.");
            }
        }
    </script>
</body>
</html>
